server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    # Evita que el navegador mantenga JS/CSS antiguos durante la entrega
    location ~* \.(css|js)$ {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        try_files $uri =404;
    }

    # Imagenes y fuentes pueden cachearse sin romper la logica del front
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Rutas limpias: /catalogo intenta cargar catalogo.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Proxy de la API al contenedor FastAPI
    # Permite llamar a /api/... desde el frontend sin CORS
    # ^~ fuerza prioridad sobre la regex de archivos estaticos (sprites .png)
    location ^~ /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
