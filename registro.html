<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — Ibermon</title>
  <link rel="stylesheet" href="styles/main.css?v=20260520b">
</head>
<body>

<div id="navbar"></div>

<main style="min-height:calc(100vh - 120px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem">

  <!-- Degradados decorativos — distintos colores a los del login para diferenciar las páginas -->
  <div style="position:fixed;inset:0;z-index:0;pointer-events:none">
    <div style="position:absolute;top:15%;right:15%;width:350px;height:350px;
      background:radial-gradient(circle,rgba(230,57,70,.06),transparent 70%);border-radius:50%"></div>
    <div style="position:absolute;bottom:15%;left:15%;width:300px;height:300px;
      background:radial-gradient(circle,rgba(157,78,221,.05),transparent 70%);border-radius:50%"></div>
  </div>

  <div style="position:relative;z-index:1;width:100%;max-width:440px">

    <div class="text-center mb-4">
      <div style="font-family:var(--font-pixel);font-size:.9rem;color:var(--text);margin-bottom:.35rem">
        ⬡ IBERMON
      </div>
      <div style="font-size:.9rem;color:var(--text-dim)">Comienza tu aventura hoy mismo</div>
    </div>

    <!-- Borde púrpura para diferenciar visualmente del login (que tiene azul) -->
    <div class="card card-body" style="border-color:var(--border-b);box-shadow:0 0 40px rgba(157,78,221,.15)">
      <h1 style="font-family:var(--font-pixel);font-size:.75rem;color:var(--text);margin-bottom:1.75rem;text-align:center">
        Crear Cuenta
      </h1>

      <!-- Dos alerts: uno para errores y otro para confirmar que el registro fue bien -->
      <div id="registerError" class="alert alert-error"   style="display:none"></div>
      <div id="registerOk"    class="alert alert-success" style="display:none"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Nombre de Entrenador</label>
          <input type="text" id="username" name="username"
            class="form-control" placeholder="AshKetchum_ESP"
            required autocomplete="username" minlength="3" maxlength="20" />
          <div class="form-hint">3–20 caracteres, sin espacios</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" name="email"
            class="form-control" placeholder="entrenador@ibermon.es"
            required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" name="password"
            class="form-control" placeholder="Mínimo 6 caracteres"
            required autocomplete="new-password" minlength="6" />
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm">Confirmar Contraseña</label>
          <input type="password" id="confirm" name="confirm"
            class="form-control" placeholder="Repite la contraseña"
            required autocomplete="new-password" />
        </div>
        <button type="submit" id="registerBtn" class="btn btn-primary w-full mt-2"
                style="font-family:var(--font-pixel);font-size:.6rem">
          ⬡ Crear cuenta
        </button>
      </form>

      <div style="text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--text-muted)">
        ¿Ya tienes cuenta?
        <a href="login.html" style="color:var(--blue);font-weight:600">Inicia sesión</a>
      </div>
    </div>

    <div style="text-align:center;margin-top:1rem">
      <a href="catalogo.html" style="font-size:.82rem;color:var(--text-muted)">
        ← Volver al catálogo público
      </a>
    </div>
  </div>
</main>

<div id="footer"></div>

<script src="scripts/modules/config.js?v=20260520b"></script>
<script src="scripts/api/api.js?v=20260520b"></script>
<script src="scripts/modules/auth.js?v=20260520b"></script>
<script src="scripts/modules/nav.js?v=20260520b"></script>
<script src="scripts/modules/chatbot.js?v=20260520b"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // initRegisterForm() está en auth.js — maneja el submit y el auto-login
    initRegisterForm();
    // initAlertToggle controla la visibilidad de los dos alerts
    initAlertToggle('registerError', 'registerOk');
  });
</script>
</body>
</html>
